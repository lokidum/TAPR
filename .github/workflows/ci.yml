name: CI

on:
  pull_request:
    branches:
      - develop
      - staging

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'

  flutter-test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/mobile/coverage/lcov.info
          flags: flutter
          token: ${{ secrets.CODECOV_TOKEN }}

  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: tapr_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tapr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tapr_test:testpassword@localhost:5432/tapr_test
      TEST_DATABASE_URL: postgresql://tapr_test:testpassword@localhost:5432/tapr_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  terraform-plan:
    name: Terraform Plan
    needs: changes
    if: needs.changes.outputs.infrastructure == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Terraform files
        id: tf-files
        run: |
          if [ -n "$(find infrastructure -name '*.tf' 2>/dev/null)" ]; then
            echo "has_tf=true" >> $GITHUB_OUTPUT
          else
            echo "has_tf=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.tf-files.outputs.has_tf == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        if: steps.tf-files.outputs.has_tf == 'true'
        run: terraform init -backend=false
        working-directory: infrastructure

      - name: Terraform plan
        if: steps.tf-files.outputs.has_tf == 'true'
        run: terraform plan -no-color
        working-directory: infrastructure

      - name: Skip (no Terraform files)
        if: steps.tf-files.outputs.has_tf != 'true'
        run: echo "No .tf files in infrastructure/, skipping terraform init and plan."
