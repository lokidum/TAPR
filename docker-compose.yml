services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: tapr
      POSTGRES_PASSWORD: tapr_dev
      POSTGRES_DB: tapr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapr -d tapr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
